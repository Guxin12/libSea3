name: 自动发布 Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
      - 'release-*'

env:
  NDK_VERSION: r27
  NDK_INSTALL_DIR: ${{ github.workspace }}/android-ndk-r27

jobs:
  create-release:
    name: 创建 Release 并打包源码
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 获取 tag 信息
      - name: 获取版本信息
        id: tag_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # 获取最近的提交信息
          COMMITS=$(git log --pretty=format:"- %s" -10)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      # 3. 打包源代码（排除不需要的文件）
      - name: 打包源代码
        run: |
          mkdir -p release
          
          # 创建全量包（源码 + 内置头文件 + third_lib 预编译库/头文件等）
          tar -czf release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-full.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='obj' \
            --exclude='libs' \
            --exclude='build' \
            --exclude='*.o' \
            --exclude='*.so' \
            --exclude='release' \
            .
          
          # 创建仅头文件包（include + driver）
          tar -czf release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-headers.tar.gz \
            include/ \
            driver/ \
            README.md \
            LICENSE
          
          # 创建静态库包（仅核心静态库 .a）
          tar -czf release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-static-libs.tar.gz \
            thrid_libs/*/lib/ \
            README.md \
            LICENSE
          
          # 创建 third_lib 头文件 + 静态库包（thrid_libs 的 include + lib）
          tar -czf release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-third_libs.tar.gz \
            thrid_libs/*/include/ \
            thrid_libs/*/lib/ \
            README.md \
            LICENSE
          
          echo "✅ 打包完成"
          ls -lh release/
      
      # 4. 缓存 NDK（用于编译示例）
      - name: 缓存 NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_INSTALL_DIR }}
          key: ndk-${{ env.NDK_VERSION }}-linux
      
      # 5. 下载 NDK（如果缓存未命中）
      - name: 安装 Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "⬇️ 下载 NDK ${{ env.NDK_VERSION }} ..."
          wget -q "https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip"
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip -d /tmp
          mv /tmp/android-ndk-${{ env.NDK_VERSION }} ${{ env.NDK_INSTALL_DIR }}
          rm android-ndk-${{ env.NDK_VERSION }}-linux.zip
      
      # 6. 编译示例程序
      - name: 编译示例程序
        run: |
          export ANDROID_NDK_HOME=${{ env.NDK_INSTALL_DIR }}
          export PATH=$ANDROID_NDK_HOME:$PATH
          
          echo "🔨 开始编译..."
          $ANDROID_NDK_HOME/ndk-build -j$(nproc)
          
          echo "✅ 编译完成"
          ls -lh libs/
      
      # 7. 打包编译产物
      - name: 打包编译产物
        run: |
          # 内存库包：只打包 memory 可执行文件（按架构）
          mkdir -p release/memory_bins
          for abi in arm64-v8a x86_64; do
            if [ -f "libs/${abi}/memory" ]; then
              mkdir -p "release/memory_bins/${abi}"
              cp "libs/${abi}/memory" "release/memory_bins/${abi}/"
            fi
          done
          tar -czf release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-memory-bins.tar.gz -C release memory_bins
          rm -rf release/memory_bins
          
          echo "✅ 编译产物打包完成"
          ls -lh release/
      
      # 8. 生成 Release 说明
      - name: 生成 Release 说明
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          # 🎉 libSeaUtral ${{ steps.tag_info.outputs.tag_name }}
          
          **发布日期**: ${{ steps.tag_info.outputs.date }}
          
          ## 📦 下载说明
          
          ### 资源包
          - **libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-full.tar.gz** - 全量包（推荐）
          - **libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-headers.tar.gz** - 头文件包（include + driver）
          - **libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-static-libs.tar.gz** - 静态库包（.a）
          - **libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-third_libs.tar.gz** - third_lib 头文件 + 静态库包
          - **libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-memory-bins.tar.gz** - 内存库包（memory 可执行文件）
          
          ## ✨ 主要特性
          
          - ✅ 多种 Driver 支持（syscall、pread64、kernel）
          - ✅ 支持 ARM64-v8a 和 x86_64 架构
          - ✅ GitHub Actions 自动构建
          - ✅ 完整的内存操作 API
          - ✅ 指针链自动解析
          
          ## 📝 最近更新
          
          ${{ steps.tag_info.outputs.commits }}
          
          ## 🚀 快速开始
          
          ```bash
          # 下载全量包
          tar -xzf libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-full.tar.gz
          cd libSeaUtral
          
          # 编译
          export ANDROID_NDK_HOME=/path/to/ndk
          ndk-build
          ```
          
          ## 📖 文档
          
          详细使用说明请查看仓库内的 README.md
          
          ## 💬 反馈
          
          如有问题或建议，欢迎提 Issue
          
          ---
          
          **注意**: 核心库为部分闭源，商业使用需获得授权
          EOF
          
          cat release_notes.md
      
      # 9. 创建 GitHub Release
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          name: libSeaUtral ${{ steps.tag_info.outputs.tag_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-full.tar.gz
            release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-headers.tar.gz
            release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-static-libs.tar.gz
            release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-third_libs.tar.gz
            release/libSeaUtral-${{ steps.tag_info.outputs.tag_name }}-memory-bins.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 10. 输出摘要
      - name: 输出摘要
        run: |
          echo "### 🎉 Release 创建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ steps.tag_info.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: ${{ steps.tag_info.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 包含的文件:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh release/ | awk '{if(NR>1) print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [查看 Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_info.outputs.tag_name }})" >> $GITHUB_STEP_SUMMARY

